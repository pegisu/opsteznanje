<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pitanja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: rgba(255,255,255,0.07);
      --accent: #f0c040;
      --accent2: #e05c3a;
      --correct: #3ecf8e;
      --wrong: #e05c3a;
      --text: #f0ede8;
      --muted: #7a788a;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,192,64,0.06) 0%, transparent 70%);
      top: -150px; right: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .quiz-wrapper {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .back-btn svg { width: 14px; height: 14px; }

    .category-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      padding: 5px 12px;
      border-radius: 100px;
    }

    /* ── DOTS ── */
    .score-dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .dot.correct { background: var(--correct); border-color: var(--correct); }
    .dot.wrong   { background: var(--wrong);   border-color: var(--wrong); }

    /* ── PROGRESS ── */
    .progress-section { margin-bottom: 10px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }

    .progress-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .progress-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      letter-spacing: 1px;
      color: var(--text);
    }
    .progress-count span { color: var(--accent); }

    .progress-bar-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .question-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    /* ── OPTIONS ── */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 10px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      text-align: left;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(240,192,64,0.05);
      transition: opacity 0.2s;
    }

    .option-btn:hover:not(:disabled)::before { opacity: 1; }
    .option-btn:hover:not(:disabled) {
      border-color: rgba(240,192,64,0.3);
      transform: translateX(3px);
    }

    .option-letter {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .option-btn:hover:not(:disabled) .option-letter {
      background: rgba(240,192,64,0.15);
      border-color: rgba(240,192,64,0.4);
      color: var(--accent);
    }

    .option-btn.correct {
      border-color: var(--correct) !important;
      background: rgba(62,207,142,0.08) !important;
      transform: none !important;
    }
    .option-btn.correct .option-letter {
      background: var(--correct) !important;
      border-color: var(--correct) !important;
      color: #0a0a0f !important;
    }

    .option-btn.wrong {
      border-color: var(--wrong) !important;
      background: rgba(224,92,58,0.08) !important;
    }
    .option-btn.wrong .option-letter {
      background: var(--wrong) !important;
      border-color: var(--wrong) !important;
      color: #fff !important;
    }

    .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }
    .option-btn.correct:disabled,
    .option-btn.wrong:disabled { opacity: 1; }

    /* ── FEEDBACK ── */
    .feedback-bar {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
    }

    .feedback-bar.correct {
      background: rgba(62,207,142,0.12);
      border: 1px solid rgba(62,207,142,0.3);
      color: var(--correct);
      display: flex;
    }

    .feedback-bar.wrong {
      background: rgba(224,92,58,0.12);
      border: 1px solid rgba(224,92,58,0.3);
      color: var(--wrong);
      display: flex;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NEXT BTN ── */
    .next-btn-wrapper {
      display: none;
      flex-direction: column;
      gap: 5px;
    }
    .next-btn-wrapper.visible {
      display: flex;
      animation: slideUp 0.3s ease;
    }

    .next-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .next-btn:hover { background: #f7d060; transform: translateY(-1px); }

    .enter-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .enter-hint kbd {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── RESULT ── */
    #result-screen {
      display: none;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 36px;
      position: relative;
      overflow: hidden;
    }

    #result-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .result-score-ring {
      width: 130px; height: 130px;
      margin: 0 auto 22px;
      position: relative;
    }

    .result-score-ring svg {
      width: 130px; height: 130px;
      transform: rotate(-90deg);
    }

    .ring-track { fill: none; stroke: var(--surface2); stroke-width: 8; }
    .ring-fill  {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1;
    }

    .ring-total { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

    .result-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .result-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .result-btn {
      padding: 12px 26px;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .result-btn.primary { background: var(--accent); color: #0a0a0f; }
    .result-btn.primary:hover { background: #f7d060; transform: translateY(-1px); }

    .result-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .result-btn.secondary:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    /* ── LOADING ── */
    #loading-screen {
      text-align: center;
      padding: 80px 40px;
    }

    .loader {
      width: 38px; height: 38px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── ERROR ── */
    #error-screen {
      display: none;
      text-align: center;
      padding: 56px 36px;
      background: var(--surface);
      border: 1px solid rgba(224,92,58,0.2);
      border-radius: var(--radius);
    }

    .error-icon {
      font-size: 36px;
      margin-bottom: 14px;
      color: var(--wrong);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }

    .error-msg {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .question-card { padding: 14px 16px; }
      .question-text { font-size: 15px; }
      .option-btn { font-size: 13px; padding: 10px 13px; gap: 10px; }
      .result-score-ring { width: 110px; height: 110px; }
      .result-score-ring svg { width: 110px; height: 110px; }
      .enter-hint { display: none; }
    }
  </style>
</head>
<body>

<div class="quiz-wrapper">

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader"></div>
    <div class="loading-text">Ucitavam pitanja...</div>
  </div>

  <!-- Error -->
  <div id="error-screen">
    <div class="error-icon">GRESKA</div>
    <p class="error-msg" id="error-msg-text">Doslo je do greske pri ucitavanju pitanja.</p>
    <br>
    <a href="index.html" class="back-btn" style="display:inline-flex;margin-top:16px;">Nazad na pocetnu</a>
  </div>

  <!-- Quiz -->
  <div id="quiz-screen" style="display:none;">

    <div class="quiz-header">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Nazad
      </a>
      <div class="category-badge" id="category-label">KATEGORIJA</div>
    </div>

    <div class="score-dots" id="score-dots"></div>

    <div class="progress-section">
      <div class="progress-meta">
        <span class="progress-label">Pitanje</span>
        <span class="progress-count">
          <span id="current-num">1</span> / <span id="total-num">10</span>
        </span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-number" id="question-number">PITANJE 01</div>
      <div class="question-text" id="question-text">Ucitavam...</div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="feedback-bar" id="feedback-bar">
      <span id="feedback-text"></span>
    </div>

    <!-- Next dugme + Enter hint zajedno -->
    <div class="next-btn-wrapper" id="next-btn-wrapper">
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        Sledece pitanje
      </button>
      <div class="enter-hint">
        ili pritisni <kbd>Enter</kbd> da nastavis
      </div>
    </div>

  </div>

  <!-- Result -->
  <div id="result-screen">
    <div class="result-score-ring">
      <svg viewBox="0 0 140 140">
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#f0c040"/>
            <stop offset="100%" stop-color="#e05c3a"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="70" cy="70" r="58"/>
        <circle class="ring-fill"  cx="70" cy="70" r="58" id="ring-fill-el"/>
      </svg>
      <div class="ring-label">
        <div class="ring-score" id="final-score">0</div>
        <div class="ring-total" id="final-total">/ 0</div>
      </div>
    </div>

    <div class="result-title" id="result-title">ODLICNO!</div>
    <div class="result-subtitle" id="result-subtitle">Uspesno si zavrsio kviz.</div>

    <div class="score-dots" id="result-dots" style="justify-content:center; margin-bottom:20px;"></div>

    <div class="result-actions">
      <button class="result-btn primary" onclick="restartQuiz()">Igraj ponovo</button>
      <button class="result-btn secondary" onclick="window.location.href='index.html'">Pocetna strana</button>
    </div>
  </div>

</div>

<script>
  // ============================================================
  //  KONFIGURACIJA
  // ============================================================
  const SUPABASE_URL      = 'https://ujamzoupwldtppyveguq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqYW16b3Vwd2xkdHBweXZlZ3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjI3MjUsImV4cCI6MjA5MTQ5ODcyNX0.sHfuZ3tgJTkfucwiAxWLAK8lOidh1o_hLeh3CSHQxT4';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  // ============================================================

  let questions  = [];
  let currentIdx = 0;
  let score      = 0;
  let answered   = false;
  let results    = [];

  const LETTERS = ['a', 'b', 'c', 'd', 'e'];

  // ============================================================
  //  URL PARAMETRI
  // ============================================================
  function parseUrlParams() {
    const params     = new URLSearchParams(window.location.search);
    const mod        = params.get('mod')        || '';
    const kategorija = params.get('kategorija') || '';
    const limit      = parseInt(params.get('limit')) || 0;

    if (mod === 'random') {
      return { mode: 'random', limit: limit || 20, label: 'SVE KATEGORIJE' };
    }
    if (mod === 'brzi') {
      return { mode: 'brzi', limit: limit || 5, label: 'BRZI KRUG' };
    }
    if (kategorija) {
      return { mode: 'kategorija', limit: limit || 20, label: kategorija.toUpperCase(), kategorija };
    }
    return null;
  }

  // ============================================================
  //  EKRANI
  // ============================================================
  function showScreen(id) {
    ['loading-screen', 'error-screen', 'quiz-screen', 'result-screen'].forEach(s => {
      const el = document.getElementById(s);
      if (el) el.style.display = 'none';
    });
    const target = document.getElementById(id);
    if (target) target.style.display = 'block';
  }

  // ============================================================
  //  FETCH — RANDOM (sva pitanja, shuffle na klijentu)
  // ============================================================
  async function fetchRandom(limit) {
    const { data, error } = await supabaseClient
      .from('quiz_pitanja')
      .select('*')
      .limit(1000);

    if (error) throw new Error(error.message);
    if (!data || data.length === 0) throw new Error('Baza pitanja je prazna.');

    return shuffleArray(data).slice(0, limit);
  }

  // ============================================================
  //  FETCH — PO KATEGORIJI
  // ============================================================
  async function fetchByKategorija(kategorija, limit) {
    const { data, error } = await supabaseClient
      .from('quiz_pitanja')
      .select('*')
      .eq('kategorija', kategorija)
      .limit(500);

    if (error) throw new Error(error.message);
    if (!data || data.length === 0) throw new Error('Nema pitanja za ovu kategoriju.');

    return shuffleArray(data).slice(0, limit);
  }

  // ============================================================
  //  POMOCNA: Fisher-Yates shuffle
  // ============================================================
  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ============================================================
  //  RENDER PITANJA
  // ============================================================
  function renderQuestion() {
    const q   = questions[currentIdx];
    const tot = questions.length;
    answered  = false;

    document.getElementById('current-num').textContent   = currentIdx + 1;
    document.getElementById('total-num').textContent     = tot;
    document.getElementById('progress-fill').style.width = `${(currentIdx / tot) * 100}%`;
    document.getElementById('question-number').textContent =
      'PITANJE ' + String(currentIdx + 1).padStart(2, '0');
    document.getElementById('question-text').textContent = q.pitanje || '';

    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';

    LETTERS.forEach(l => {
      const val = q['odgovor_' + l];
      if (!val || val.trim() === '') return;

      const btn = document.createElement('button');
      btn.className      = 'option-btn';
      btn.dataset.letter = l;
      btn.innerHTML = `
        <span class="option-letter">${l.toUpperCase()}</span>
        <span>${val}</span>
      `;
      btn.onclick = () => selectAnswer(l, btn);
      grid.appendChild(btn);
    });

    // Reset feedback i next wrapper
    document.getElementById('feedback-bar').className = 'feedback-bar';
    document.getElementById('next-btn-wrapper').classList.remove('visible');

    // Tekst dugmeta
    document.getElementById('next-btn').textContent = currentIdx < questions.length - 1
      ? 'Sledece pitanje'
      : 'Pogledaj rezultat';

    renderDots();

    // Animacija pri promeni pitanja
    const card = document.querySelector('.question-card');
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = 'slideUp 0.35s ease';

    grid.style.animation = 'none';
    void grid.offsetWidth;
    grid.style.animation = 'slideUp 0.4s ease 0.05s both';
  }

  // ============================================================
  //  ODABIR ODGOVORA
  // ============================================================
  function selectAnswer(letter, clickedBtn) {
    if (answered) return;
    answered = true;

    const q       = questions[currentIdx];
    const correct = (q.tacno_odgovor || '').toLowerCase().trim();
    const isRight = letter.toLowerCase() === correct;

    document.querySelectorAll('.option-btn').forEach(b => {
      b.disabled = true;
      if (b.dataset.letter === correct) b.classList.add('correct');
    });

    if (!isRight) clickedBtn.classList.add('wrong');

    results[currentIdx] = isRight;
    if (isRight) score++;
    renderDots();

    const fb = document.getElementById('feedback-bar');
    const ft = document.getElementById('feedback-text');

    if (isRight) {
      fb.className   = 'feedback-bar correct';
      ft.textContent = 'Tacno! Odlican odgovor.';
    } else {
      fb.className   = 'feedback-bar wrong';
      const correctText = q['odgovor_' + correct] || correct.toUpperCase();
      ft.textContent = 'Netacno. Tacan odgovor je: ' + correctText;
    }

    // Azuriraj tekst i pokazi dugme
    document.getElementById('next-btn').textContent = currentIdx < questions.length - 1
      ? 'Sledece pitanje'
      : 'Pogledaj rezultat';
    document.getElementById('next-btn-wrapper').classList.add('visible');
  }

  // ============================================================
  //  SLEDECE PITANJE
  // ============================================================
  function nextQuestion() {
    currentIdx++;
    if (currentIdx >= questions.length) {
      showResult();
    } else {
      renderQuestion();
    }
  }

  // ============================================================
  //  ENTER TIPKA — idi dalje samo ako je odgovoreno
  // ============================================================
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const wrapper = document.getElementById('next-btn-wrapper');
      if (wrapper && wrapper.classList.contains('visible')) {
        nextQuestion();
      }
    }
  });

  // ============================================================
  //  DOTS
  // ============================================================
  function renderDots() {
    const container = document.getElementById('score-dots');
    container.innerHTML = '';
    questions.forEach((_, i) => {
      const d = document.createElement('div');
      if      (results[i] === true)  d.className = 'dot correct';
      else if (results[i] === false) d.className = 'dot wrong';
      else                           d.className = 'dot';
      container.appendChild(d);
    });
  }

  // ============================================================
  //  REZULTAT
  // ============================================================
  function showResult() {
    showScreen('result-screen');

    const tot = questions.length;
    const pct = Math.round((score / tot) * 100);

    document.getElementById('final-score').textContent = score;
    document.getElementById('final-total').textContent = '/ ' + tot;

    const circ = 2 * Math.PI * 58;
    const el   = document.getElementById('ring-fill-el');
    el.style.strokeDasharray  = circ;
    el.style.strokeDashoffset = circ;
    setTimeout(() => {
      el.style.strokeDashoffset = circ - (circ * score / tot);
    }, 100);

    let title, subtitle;
    if      (pct === 100) { title = 'SAVRSENO!';    subtitle = 'Sve tacno! Pravi sampion!'; }
    else if (pct >= 80)   { title = 'ODLICNO!';     subtitle = 'Tacno: ' + score + ' od ' + tot + '. Sjajan rezultat!'; }
    else if (pct >= 60)   { title = 'SOLIDNO!';     subtitle = 'Tacno: ' + score + ' od ' + tot + '. Ima prostora za napredak!'; }
    else if (pct >= 40)   { title = 'MOZE BOLJE!';  subtitle = 'Tacno: ' + score + ' od ' + tot + '. Pokusaj ponovo!'; }
    else                  { title = 'POKUSAJ OPET!';subtitle = 'Tacno: ' + score + ' od ' + tot + '. Ne odustaj!'; }

    document.getElementById('result-title').textContent    = title;
    document.getElementById('result-subtitle').textContent = subtitle;

    const rd = document.getElementById('result-dots');
    rd.innerHTML = '';
    results.forEach(r => {
      const d = document.createElement('div');
      d.className = 'dot ' + (r ? 'correct' : 'wrong');
      rd.appendChild(d);
    });
  }

  // ============================================================
  //  RESTART
  // ============================================================
  async function restartQuiz() {
    currentIdx = 0;
    score      = 0;
    results    = [];
    showScreen('loading-screen');

    try {
      const config = parseUrlParams();
      if (!config) { window.location.href = 'index.html'; return; }

      if (config.mode === 'kategorija') {
        questions = await fetchByKategorija(config.kategorija, config.limit);
      } else {
        questions = await fetchRandom(config.limit);
      }

      results = new Array(questions.length).fill(null);
      showScreen('quiz-screen');
      renderQuestion();
    } catch (err) {
      document.getElementById('error-msg-text').textContent =
        'Greska pri ucitavanju: ' + err.message;
      showScreen('error-screen');
    }
  }

  // ============================================================
  //  INIT
  // ============================================================
  async function init() {
    showScreen('loading-screen');

    const config = parseUrlParams();

    if (!config) {
      document.getElementById('error-msg-text').textContent =
        'Nije izabran nacin testiranja. Vrati se na pocetnu stranicu.';
      showScreen('error-screen');
      return;
    }

    document.getElementById('category-label').textContent = config.label;
    document.title = 'Kviz - ' + config.label;

    try {
      if (config.mode === 'kategorija') {
        questions = await fetchByKategorija(config.kategorija, config.limit);
      } else {
        questions = await fetchRandom(config.limit);
      }

      if (!questions || questions.length === 0) {
        const msg = config.mode === 'kategorija'
          ? 'Nema pitanja za kategoriju "' + config.kategorija + '".'
          : 'Baza pitanja je prazna.';
        document.getElementById('error-msg-text').textContent = msg;
        showScreen('error-screen');
        return;
      }

      results = new Array(questions.length).fill(null);
      showScreen('quiz-screen');
      renderQuestion();

    } catch (err) {
      console.error('Init greska:', err);
      document.getElementById('error-msg-text').textContent =
        'Greska pri konekciji sa bazom: ' + err.message;
      showScreen('error-screen');
    }
  }

  init();
</script>
</body>
</html>
