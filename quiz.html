<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kviz - Pitanja</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: rgba(255,255,255,0.07);
      --accent: #f0c040;
      --accent2: #e05c3a;
      --correct: #3ecf8e;
      --wrong: #e05c3a;
      --text: #f0ede8;
      --muted: #7a788a;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,192,64,0.06) 0%, transparent 70%);
      top: -150px;
      right: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .quiz-wrapper {
      width: 100%;
      max-width: 720px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .back-btn svg { width: 14px; height: 14px; }

    .category-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      padding: 6px 14px;
      border-radius: 100px;
    }

    /* ── PROGRESS ── */
    .progress-section {
      margin-bottom: 28px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .progress-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--text);
    }

    .progress-count span { color: var(--accent); }

    .progress-bar-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .question-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    /* ── OPTIONS ── */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      text-align: left;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(240,192,64,0.05);
      transition: opacity 0.2s;
    }

    .option-btn:hover:not(:disabled)::before { opacity: 1; }
    .option-btn:hover:not(:disabled) { border-color: rgba(240,192,64,0.3); transform: translateX(3px); }

    .option-letter {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.5px;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .option-btn:hover:not(:disabled) .option-letter {
      background: rgba(240,192,64,0.15);
      border-color: rgba(240,192,64,0.4);
      color: var(--accent);
    }

    /* States */
    .option-btn.correct {
      border-color: var(--correct) !important;
      background: rgba(62,207,142,0.08) !important;
      transform: none !important;
    }
    .option-btn.correct .option-letter {
      background: var(--correct) !important;
      border-color: var(--correct) !important;
      color: #0a0a0f !important;
    }

    .option-btn.wrong {
      border-color: var(--wrong) !important;
      background: rgba(224,92,58,0.08) !important;
    }
    .option-btn.wrong .option-letter {
      background: var(--wrong) !important;
      border-color: var(--wrong) !important;
      color: #fff !important;
    }

    .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }
    .option-btn.correct:disabled,
    .option-btn.wrong:disabled { opacity: 1; }

    /* ── FEEDBACK ── */
    .feedback-bar {
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: slideUp 0.3s ease;
    }

    .feedback-bar.correct {
      background: rgba(62,207,142,0.12);
      border: 1px solid rgba(62,207,142,0.3);
      color: var(--correct);
      display: flex;
    }

    .feedback-bar.wrong {
      background: rgba(224,92,58,0.12);
      border: 1px solid rgba(224,92,58,0.3);
      color: var(--wrong);
      display: flex;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NEXT BUTTON ── */
    .next-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
    }

    .next-btn:hover { background: #f7d060; transform: translateY(-1px); }
    .next-btn.visible { display: block; animation: slideUp 0.3s ease; }

    /* ── SCORE DOTS ── */
    .score-dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .dot.correct { background: var(--correct); border-color: var(--correct); }
    .dot.wrong   { background: var(--wrong);   border-color: var(--wrong); }

    /* ── RESULT SCREEN ── */
    #result-screen {
      display: none;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 56px 40px;
      position: relative;
      overflow: hidden;
    }

    #result-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .result-score-ring {
      width: 140px;
      height: 140px;
      margin: 0 auto 28px;
      position: relative;
    }

    .result-score-ring svg {
      width: 140px;
      height: 140px;
      transform: rotate(-90deg);
    }

    .ring-track { fill: none; stroke: var(--surface2); stroke-width: 8; }
    .ring-fill  {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1;
    }

    .ring-total {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .result-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .result-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .result-btn {
      padding: 13px 28px;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .result-btn.primary {
      background: var(--accent);
      color: #0a0a0f;
    }
    .result-btn.primary:hover { background: #f7d060; transform: translateY(-1px); }

    .result-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .result-btn.secondary:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }

    /* ── LOADING ── */
    #loading-screen {
      text-align: center;
      padding: 80px 40px;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── ERROR ── */
    #error-screen {
      display: none;
      text-align: center;
      padding: 60px 40px;
      background: var(--surface);
      border: 1px solid rgba(224,92,58,0.2);
      border-radius: var(--radius);
    }

    .error-icon {
      font-size: 40px;
      margin-bottom: 16px;
      color: var(--wrong);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }

    .error-msg {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .question-card { padding: 24px 20px; }
      .question-text { font-size: 17px; }
      .option-btn { font-size: 14px; padding: 14px 16px; gap: 12px; }
      .result-score-ring { width: 120px; height: 120px; }
      .result-score-ring svg { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>

<div class="quiz-wrapper">

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader"></div>
    <div class="loading-text">Ucitavam pitanja...</div>
  </div>

  <!-- Error -->
  <div id="error-screen">
    <div class="error-icon">! GRESKA</div>
    <p class="error-msg" id="error-msg-text">Doslo je do greske pri ucitavanju pitanja.</p>
    <br>
    <a href="index.html" class="back-btn" style="display:inline-flex;margin-top:16px;">Nazad na pocetnu</a>
  </div>

  <!-- Quiz -->
  <div id="quiz-screen" style="display:none;">

    <div class="quiz-header">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Nazad
      </a>
      <div class="category-badge" id="category-label">KATEGORIJA</div>
    </div>

    <div class="score-dots" id="score-dots"></div>

    <div class="progress-section">
      <div class="progress-meta">
        <span class="progress-label">Pitanje</span>
        <span class="progress-count" id="progress-count">
          <span id="current-num">1</span> / <span id="total-num">10</span>
        </span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-number" id="question-number">PITANJE 01</div>
      <div class="question-text" id="question-text">Ucitavam...</div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="feedback-bar" id="feedback-bar">
      <span id="feedback-text"></span>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      Sledece pitanje
    </button>

  </div>

  <!-- Result -->
  <div id="result-screen">
    <div class="result-score-ring">
      <svg viewBox="0 0 140 140">
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#f0c040"/>
            <stop offset="100%" stop-color="#e05c3a"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="70" cy="70" r="58"/>
        <circle class="ring-fill"  cx="70" cy="70" r="58" id="ring-fill-el"/>
      </svg>
      <div class="ring-label">
        <div class="ring-score" id="final-score">0</div>
        <div class="ring-total" id="final-total">/ 0</div>
      </div>
    </div>

    <div class="result-title" id="result-title">ODLICNO!</div>
    <div class="result-subtitle" id="result-subtitle">Uspesno si zavrsio kviz.</div>

    <div class="score-dots" id="result-dots" style="justify-content:center;"></div>

    <div class="result-actions">
      <button class="result-btn primary" onclick="restartQuiz()">Igraj ponovo</button>
      <button class="result-btn secondary" onclick="window.location.href='index.html'">Pocetna strana</button>
    </div>
  </div>

</div>

<script>
  // ============================================================
  //  KONFIGURACIJA — ZAMENI SA TVOJIM SUPABASE PODACIMA!
  // ============================================================
  const SUPABASE_URL = 'https://ujamzoupwldtppyveguq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqYW16b3Vwd2xkdHBweXZlZ3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjI3MjUsImV4cCI6MjA5MTQ5ODcyNX0.sHfuZ3tgJTkfucwiAxWLAK8lOidh1o_hLeh3CSHQxT4';
  // ============================================================

  let questions   = [];
  let currentIdx  = 0;
  let score       = 0;
  let answered    = false;
  let results     = []; // true/false per question
  let kategorija  = '';

  const LETTERS = ['a','b','c','d','e'];

  // ── GET CATEGORY FROM URL ──
  function getKategorija() {
    const params = new URLSearchParams(window.location.search);
    return params.get('kategorija') || '';
  }

  // ── FETCH QUESTIONS ──
  async function fetchQuestions(kat) {
    const url = `${SUPABASE_URL}/rest/v1/quiz_pitanja?kategorija=eq.${encodeURIComponent(kat)}&select=*&order=random()&limit=15`;

    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json'
      }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }

  // ── SHOW SCREEN ──
  function showScreen(id) {
    ['loading-screen','error-screen','quiz-screen','result-screen']
      .forEach(s => {
        const el = document.getElementById(s);
        if (el) el.style.display = (s === id) ? (id === 'quiz-screen' ? 'block' : 'flex') : 'none';
      });
    if (id === 'quiz-screen') document.getElementById('quiz-screen').style.display = 'block';
    if (id === 'result-screen') document.getElementById('result-screen').style.display = 'block';
    if (id === 'loading-screen') document.getElementById('loading-screen').style.display = 'block';
    if (id === 'error-screen') document.getElementById('error-screen').style.display = 'block';
  }

  // ── RENDER QUESTION ──
  function renderQuestion() {
    const q   = questions[currentIdx];
    const tot = questions.length;
    answered  = false;

    // Progress
    document.getElementById('current-num').textContent = currentIdx + 1;
    document.getElementById('total-num').textContent   = tot;
    document.getElementById('progress-fill').style.width = `${(currentIdx / tot) * 100}%`;
    document.getElementById('question-number').textContent =
      'PITANJE ' + String(currentIdx + 1).padStart(2, '0');
    document.getElementById('question-text').textContent = q.pitanje || '';

    // Options
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    LETTERS.forEach(l => {
      const val = q['odgovor_' + l];
      if (!val || val.trim() === '') return;
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.dataset.letter = l;
      btn.innerHTML = `
        <span class="option-letter">${l.toUpperCase()}</span>
        <span>${val}</span>
      `;
      btn.onclick = () => selectAnswer(l, btn);
      grid.appendChild(btn);
    });

    // Hide feedback + next
    document.getElementById('feedback-bar').className = 'feedback-bar';
    document.getElementById('next-btn').classList.remove('visible');

    // Update dots
    renderDots();

    // Animation
    document.querySelector('.question-card').style.animation = 'none';
    void document.querySelector('.question-card').offsetWidth;
    document.querySelector('.question-card').style.animation = 'slideUp 0.35s ease';
    grid.style.animation = 'none';
    void grid.offsetWidth;
    grid.style.animation = 'slideUp 0.4s ease 0.05s both';
  }

  // ── SELECT ANSWER ──
  function selectAnswer(letter, clickedBtn) {
    if (answered) return;
    answered = true;

    const q       = questions[currentIdx];
    const correct = (q.tacno_odgovor || '').toLowerCase().trim();
    const isRight = letter.toLowerCase() === correct;

    // Disable all
    document.querySelectorAll('.option-btn').forEach(b => {
      b.disabled = true;
      if (b.dataset.letter === correct) b.classList.add('correct');
    });

    if (!isRight) clickedBtn.classList.add('wrong');

    // Track
    results[currentIdx] = isRight;
    if (isRight) score++;
    renderDots();

    // Feedback
    const fb = document.getElementById('feedback-bar');
    const ft = document.getElementById('feedback-text');
    if (isRight) {
      fb.className = 'feedback-bar correct';
      ft.textContent = 'Tacno! Odlican odgovor.';
    } else {
      fb.className = 'feedback-bar wrong';
      ft.textContent = `Netacno. Tacan odgovor je: ${q['odgovor_' + correct] || correct.toUpperCase()}`;
    }

    // Next btn
    const nextBtn = document.getElementById('next-btn');
    nextBtn.textContent = currentIdx < questions.length - 1 ? 'Sledece pitanje' : 'Pogledaj rezultat';
    nextBtn.classList.add('visible');
  }

  // ── NEXT QUESTION ──
  function nextQuestion() {
    currentIdx++;
    if (currentIdx >= questions.length) {
      showResult();
    } else {
      renderQuestion();
    }
  }

  // ── RENDER DOTS ──
  function renderDots() {
    const container = document.getElementById('score-dots');
    container.innerHTML = '';
    questions.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (results[i] === true ? ' correct' : results[i] === false ? ' wrong' : '');
      container.appendChild(d);
    });
  }

  // ── SHOW RESULT ──
  function showResult() {
    showScreen('result-screen');

    const tot   = questions.length;
    const pct   = Math.round((score / tot) * 100);

    document.getElementById('final-score').textContent = score;
    document.getElementById('final-total').textContent = '/ ' + tot;

    // Ring animation
    const r = 58;
    const circ = 2 * Math.PI * r;
    const el = document.getElementById('ring-fill-el');
    el.style.strokeDasharray  = circ;
    el.style.strokeDashoffset = circ;
    setTimeout(() => {
      el.style.strokeDashoffset = circ - (circ * score / tot);
    }, 100);

    // Title
    let title, subtitle;
    if (pct === 100) {
      title    = 'SAVRSENO!';
      subtitle = 'Sve tacno! Nisi pogresiio ni jedno pitanje. Pravi sampion!';
    } else if (pct >= 80) {
      title    = 'ODLICNO!';
      subtitle = `Tacan odgovor na ${score} od ${tot} pitanja. Sjajan rezultat!`;
    } else if (pct >= 60) {
      title    = 'SOLIDNO!';
      subtitle = `Tacan odgovor na ${score} od ${tot} pitanja. Ima prostora za napredak!`;
    } else if (pct >= 40) {
      title    = 'MOZE BOLJE!';
      subtitle = `Tacan odgovor na ${score} od ${tot} pitanja. Pokusaj ponovo!`;
    } else {
      title    = 'PROBA OPET!';
      subtitle = `Tacan odgovor na ${score} od ${tot} pitanja. Ne odustaj!`;
    }

    document.getElementById('result-title').textContent    = title;
    document.getElementById('result-subtitle').textContent = subtitle;

    // Result dots
    const rd = document.getElementById('result-dots');
    rd.innerHTML = '';
    results.forEach(r => {
      const d = document.createElement('div');
      d.className = 'dot ' + (r ? 'correct' : 'wrong');
      rd.appendChild(d);
    });
  }

  // ── RESTART ──
  function restartQuiz() {
    currentIdx = 0;
    score      = 0;
    results    = [];
    showScreen('quiz-screen');
    // Re-shuffle
    questions = questions.sort(() => Math.random() - 0.5);
    renderQuestion();
  }

  // ── INIT ──
  async function init() {
    showScreen('loading-screen');
    kategorija = getKategorija();

    if (!kategorija) {
      document.getElementById('error-msg-text').textContent =
        'Nije izabrana kategorija. Vrati se na pocetnu stranicu i klikni na kategoriju.';
      showScreen('error-screen');
      return;
    }

    document.getElementById('category-label').textContent = kategorija.toUpperCase();
    document.title = `Kviz - ${kategorija}`;

    try {
      questions = await fetchQuestions(kategorija);
      if (!questions || questions.length === 0) {
        document.getElementById('error-msg-text').textContent =
          `Nema pitanja za kategoriju "${kategorija}". Molimo dodajte pitanja u admin panelu.`;
        showScreen('error-screen');
        return;
      }
      // Shuffle
      questions = questions.sort(() => Math.random() - 0.5);
      results   = new Array(questions.length).fill(null);
      showScreen('quiz-screen');
      renderQuestion();
    } catch (err) {
      console.error(err);
      document.getElementById('error-msg-text').textContent =
        'Greska pri konekciji sa bazom. Proveri SUPABASE_URL i SUPABASE_ANON_KEY. Detalji: ' + err.message;
      showScreen('error-screen');
    }
  }

  init();
</script>
</body>
</html>
