<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Prijava</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dark: #9a7a2e;
      --dark: #0d0d0d;
      --dark2: #141414;
      --dark3: #1c1c1c;
      --dark4: #242424;
      --border: rgba(201,168,76,0.25);
      --text: #e8e0d0;
      --text-muted: #8a7f6e;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(201,168,76,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(201,168,76,0.05) 0%, transparent 55%);
    }

    /* HEADER */
    header {
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-logo span {
      color: var(--text);
      font-weight: 300;
      font-size: 0.85rem;
      display: block;
      letter-spacing: 4px;
      font-family: 'Lato', sans-serif;
    }

    .header-badge {
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 30px;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* LOGIN WRAPPER */
    .login-wrap {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ICON TOP */
    .login-icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(201,168,76,0.08);
    }

    .login-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* HEADING */
    .login-heading {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .login-heading p {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* CARD */
    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(201,168,76,0.08) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      background: rgba(201,168,76,0.15);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    .card-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .card-body {
      padding: 28px;
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      padding: 12px 14px 12px 42px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }

    input[type="email"]:focus + svg,
    input[type="password"]:focus + svg {
      stroke: var(--gold);
    }

    /* Ikona za show/hide lozinku */
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      cursor: pointer;
      transition: stroke 0.2s;
    }

    .toggle-pass:hover { stroke: var(--gold); }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* SUBMIT BTN */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #0d0d0d;
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.25);
    }

    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* SPINNER */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(13,13,13,0.3);
      border-top-color: #0d0d0d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.show { display: block; }

    /* ALERT */
    .alert {
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
      display: none;
      line-height: 1.4;
    }

    .alert.show { display: block; }
    .alert-success {
      background: rgba(30,126,52,0.18);
      border: 1px solid rgba(30,126,52,0.5);
      color: #58d68d;
    }
    .alert-error {
      background: rgba(192,57,43,0.18);
      border: 1px solid rgba(192,57,43,0.5);
      color: #ec7063;
    }

    /* FOOTER */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .login-footer span {
      color: var(--gold);
      opacity: 0.7;
    }

    /* DECORATIVE LINE */
    .deco-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .deco-line::before,
    .deco-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .deco-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      header { padding: 0 20px; }
      .header-badge { display: none; }
      .login-heading h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    Opšte znanje
    <span>Admin Panel</span>
  </div>
  <div class="header-badge">Administratorski Pristup</div>
</header>

<div class="main">
  <div class="login-wrap">

    <!-- IKONA -->
    <div class="login-icon-wrap">
      <div class="login-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
    </div>

    <!-- NASLOV -->
    <div class="login-heading">
      <h1>Dobrodošli</h1>
      <p>Prijavite se na admin panel</p>
    </div>

    <!-- DEKORATIVNA LINIJA -->
    <div class="deco-line">
      <div class="deco-diamond"></div>
    </div>

    <!-- KARTICA -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Prijava</div>
          <div class="card-subtitle">Unesite svoje podatke</div>
        </div>
      </div>

      <div class="card-body">
        <div id="alert" class="alert"></div>

        <div class="form-group">
          <label>Email adresa</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              placeholder="admin@email.com"
              autocomplete="email"
            />
            <svg viewBox="0 0 24 24" style="pointer-events:none;">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label>Lozinka</label>
          <div class="input-wrap" style="position:relative;">
            <input
              type="password"
              id="lozinka"
              placeholder="Unesite lozinku"
              autocomplete="current-password"
              onkeydown="if(event.key==='Enter') prijavi()"
            />
            <svg viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <svg class="toggle-pass" id="toggle-eye" viewBox="0 0 24 24" onclick="togglePass()" title="Prikazi/Sakrij lozinku">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
        </div>

        <div class="divider"></div>

        <button class="btn-primary" id="btn-prijava" onclick="prijavi()">
          <span class="spinner" id="spinner"></span>
          <span id="btn-text">Prijavi se</span>
        </button>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="login-footer">
      <span>Opšte Znanje</span> &nbsp;&mdash;&nbsp; Samo za administratore
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ujamzoupwldtppyveguq.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_EcF3QnSyfxGW_ZJa741PRA_y-xVaH4N';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // --- Provjeri da li je vec prijavljen ---
  async function provjeriSesiju() {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      window.location.href = 'admin.html';
    }
  }

  // --- Toggle lozinka vidljivost ---
  function togglePass() {
    const input = document.getElementById('lozinka');
    const eye = document.getElementById('toggle-eye');
    if (input.type === 'password') {
      input.type = 'text';
      eye.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    } else {
      input.type = 'password';
      eye.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }
  }

  // --- Prikazi alert ---
  function showAlert(tip, poruka) {
    const el = document.getElementById('alert');
    el.className = 'alert show alert-' + tip;
    el.textContent = poruka;
    if (tip === 'error') {
      setTimeout(() => el.classList.remove('show'), 5000);
    }
  }

  // --- Loading stanje ---
  function setLoading(val) {
    const btn = document.getElementById('btn-prijava');
    const spinner = document.getElementById('spinner');
    const txt = document.getElementById('btn-text');
    btn.disabled = val;
    spinner.classList.toggle('show', val);
    txt.textContent = val ? 'Prijavljivanje...' : 'Prijavi se';
  }

  // --- Prijava ---
  async function prijavi() {
    const email = document.getElementById('email').value.trim();
    const lozinka = document.getElementById('lozinka').value;

    if (!email || !lozinka) {
      showAlert('error', 'Molim te unesite email i lozinku.');
      return;
    }

    setLoading(true);

    const { data, error } = await db.auth.signInWithPassword({
      email: email,
      password: lozinka
    });

    setLoading(false);

    if (error) {
      let poruka = 'Pogresni podaci. Pokusajte ponovo.';
      if (error.message.includes('Invalid login')) {
        poruka = 'Pogrešna email adresa ili lozinka.';
      } else if (error.message.includes('Email not confirmed')) {
        poruka = 'Email adresa nije potvrdjena.';
      } else if (error.message.includes('Too many requests')) {
        poruka = 'Previše pokušaja. Sačekajte malo.';
      }
      showAlert('error', poruka);
      return;
    }

    showAlert('success', 'Uspešna prijava! Preusmeravanje...');
    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 1000);
  }

  // --- Init ---
  provjeriSesiju();
</script>
</body>
</html>
